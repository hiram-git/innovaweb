<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — InnovaWeb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #020617;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      width: 64px; height: 64px;
      background: #1e3a5f;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 32px; height: 32px; stroke: #60a5fa; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    p { color: #94a3b8; font-size: .9375rem; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: .5rem;
      padding: .625rem 1.5rem;
      font-size: .9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No tienes acceso a internet. Algunas funciones están disponibles offline. Revisa tu conexión e intenta de nuevo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
