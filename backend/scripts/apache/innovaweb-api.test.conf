# ============================================================================
# Virtual Host para InnovaWeb API (Laravel 11) en Laragon 6.0
#
# INSTALACION:
#   Copiar este archivo a:
#   C:\laragon\etc\apache2\sites-enabled\innovaweb-api.test.conf
#
#   Luego reiniciar Apache en Laragon (Stop All > Start All)
#
# El dominio "innovaweb-api.test" se resuelve automaticamente en Laragon
# gracias al DNS local de Laragon (sin necesitar editar hosts de Windows).
# ============================================================================

<VirtualHost *:80>
    ServerName innovaweb-api.test
    DocumentRoot "C:/laragon/www/innovaweb/backend/public"

    <Directory "C:/laragon/www/innovaweb/backend/public">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Laravel necesita que todas las peticiones pasen por index.php
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php/$1 [L,QSA]
        </IfModule>
    </Directory>

    # Logs separados por aplicacion
    ErrorLog  "C:/laragon/log/innovaweb-api-error.log"
    CustomLog "C:/laragon/log/innovaweb-api-access.log" combined

    # Headers de seguridad
    <IfModule mod_headers.c>
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set X-XSS-Protection "1; mode=block"

        # CORS para el frontend React en desarrollo
        # Ajustar el origin cuando el frontend tenga su propio dominio
        Header always set Access-Control-Allow-Origin "http://localhost:5173"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept"
        Header always set Access-Control-Allow-Credentials "true"
    </IfModule>

    # Preflight OPTIONS para CORS
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]
</VirtualHost>

# Virtual Host SSL (HTTPS) — Laragon genera certificados automaticamente
<VirtualHost *:443>
    ServerName innovaweb-api.test
    DocumentRoot "C:/laragon/www/innovaweb/backend/public"

    SSLEngine on
    SSLCertificateFile    "C:/laragon/etc/ssl/innovaweb-api.test.crt"
    SSLCertificateKeyFile "C:/laragon/etc/ssl/innovaweb-api.test.key"

    <Directory "C:/laragon/www/innovaweb/backend/public">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php/$1 [L,QSA]
        </IfModule>
    </Directory>

    ErrorLog  "C:/laragon/log/innovaweb-api-ssl-error.log"
    CustomLog "C:/laragon/log/innovaweb-api-ssl-access.log" combined

    <IfModule mod_headers.c>
        Header always set X-Frame-Options "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>
</VirtualHost>
