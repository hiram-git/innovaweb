; ─── InnovaWeb PHP Production Settings ─────────────────────────────────────

[PHP]
; Seguridad
expose_php          = Off
display_errors      = Off
log_errors          = On
error_log           = /var/www/html/backend/storage/logs/php_error.log

; Rendimiento
opcache.enable              = 1
opcache.memory_consumption  = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0  ; En producción no revalidar (immutable builds)

; Límites
upload_max_filesize = 20M
post_max_size       = 20M
max_execution_time  = 60
memory_limit        = 256M

; Zona horaria
date.timezone = America/Panama

; Sesiones (no usadas en API, pero por si acaso)
session.cookie_secure   = 1
session.cookie_httponly = 1
session.cookie_samesite = Strict
