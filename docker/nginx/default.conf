# ─── InnovaWeb Nginx — API Backend ───────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_login:10m   rate=10r/m;

server {
    listen 80;
    server_name innovaweb-api.test _;

    root /var/www/html/backend/public;
    index index.php;

    # Charset
    charset utf-8;

    # Tamaño máximo de cuerpo (facturas con PDF base64)
    client_max_body_size 20M;

    # Ocultar versión de Nginx
    server_tokens off;

    # ─── Logs ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/innovaweb_access.log;
    error_log  /var/log/nginx/innovaweb_error.log;

    # ─── API v1 ───────────────────────────────────────────────────────────
    location /api/v1/login {
        limit_req zone=api_login burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ──────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Timeouts
        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;

        # Buffer
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ─── Assets estáticos ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Deny acceso a archivos sensibles ────────────────────────────────
    location ~ /\.(env|git|htaccess) { deny all; }
    location ~ ^/(storage|bootstrap/cache) { deny all; }

    # ─── Fallback SPA ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

# ─── Frontend React (SPA) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name innovaweb.test;

    root /var/www/html/frontend/dist;
    index index.html;

    server_tokens off;
    charset utf-8;

    # Cabeceras de seguridad (complementan las del middleware PHP)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # PWA: Service Worker tiene acceso al scope raíz
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Assets con hash (Vite genera nombres con hash) — cache largo
    location ~* \.(js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
